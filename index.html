<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5599322299160416"
     crossorigin="anonymous"></script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Bomb</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    
        <style>
        /* 画面全体の基準を作る */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1A2533;
            overflow: hidden; /* スクロールを完全に禁止 */
            position: fixed; /* iPhoneのメニューバーによるガタつきを防止 */
        }

        /* p5.jsが作るcanvas要素を強制的に画面の真ん中に置く */
        canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 自身のサイズの半分だけ戻して真ん中に */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>

</head>
<body>
    <script src="sketch.js"></script>
</body>
</html>
